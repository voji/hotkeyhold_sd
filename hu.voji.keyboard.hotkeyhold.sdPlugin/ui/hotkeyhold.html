<!DOCTYPE html>
<html>

<head lang="en">
    <title>Hotkey hold Settings</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
    <style>
        .hotkey-row {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
            position: relative;
        }

        .hotkey-field {
            flex: 1 1 auto;
            min-width: 0;
        }

        .special-key-button {
            flex: 0 0 auto;
            border: 1px solid #5c5d63;
            border-radius: 4px;
            background: #2f3035;
            color: #f5f5f5;
            padding: 3px 8px;
            cursor: pointer;
            font-size: 11px;
            line-height: 1.4;
        }

        .special-key-menu {
            position: absolute;
            top: calc(100% + 4px);
            right: 0;
            width: 170px;
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid #5c5d63;
            border-radius: 6px;
            background: #2f3035;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.35);
            padding: 4px 0;
            margin: 0;
            list-style: none;
            z-index: 99;
        }

        .special-key-menu[hidden] {
            display: none;
        }

        .special-key-menu button {
            width: 100%;
            text-align: left;
            border: 0;
            background: transparent;
            color: #f5f5f5;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 11px;
        }

        .special-key-menu button:hover {
            background: #3f4046;
        }
    </style>
</head>

<body>
    <!--
        Learn more about property inspector components at https://sdpi-components.dev/docs/components
    -->
    <sdpi-item label="Hotkey">
        <div class="hotkey-row">
            <sdpi-textfield class="hotkey-field" setting="hotkey" placeholder="A, 1, F1, Left, Enter"></sdpi-textfield>
            <button id="special-key-toggle" class="special-key-button" type="button">Special</button>
            <ul id="special-key-menu" class="special-key-menu" hidden></ul>
        </div>
    </sdpi-item>
    <!--
        Modifier keys are not implemented yet
    -->
    <sdpi-item label="Shift">
        <sdpi-checkbox setting="mod_shift"></sdpi-checkbox>
    </sdpi-item>
    <sdpi-item label="Control">
        <sdpi-checkbox setting="mod_ctrl"></sdpi-checkbox>
    </sdpi-item>
    <sdpi-item label="Alt">
        <sdpi-checkbox setting="mod_alt"></sdpi-checkbox>
    </sdpi-item>
    <sdpi-item label="Win">
        <sdpi-checkbox setting="mod_win"></sdpi-checkbox>
    </sdpi-item>

    <script>
        const hotkeyField = document.querySelector('sdpi-textfield[setting="hotkey"]');
        const specialKeyToggle = document.getElementById("special-key-toggle");
        const specialKeyMenu = document.getElementById("special-key-menu");
        let lastValidHotkey = "";

        const namedKeys = new Map([
            ["left", "Left"],
            ["right", "Right"],
            ["up", "Up"],
            ["down", "Down"],
            ["enter", "Enter"],
            ["escape", "Escape"],
            ["tab", "Tab"],
            ["space", "Space"],
            ["backspace", "Backspace"],
            ["delete", "Delete"],
            ["home", "Home"],
            ["end", "End"],
            ["pageup", "PageUp"],
            ["pagedown", "PageDown"],
            ["insert", "Insert"]
        ]);
        const functionKeys = Array.from({ length: 24 }, (_, i) => `F${i + 1}`);
        const pickerKeys = [
            ...functionKeys,
            ...Array.from(new Set(namedKeys.values()))
        ];

        function closeSpecialKeyMenu() {
            specialKeyMenu.hidden = true;
        }

        function toggleSpecialKeyMenu() {
            specialKeyMenu.hidden = !specialKeyMenu.hidden;
        }

        function setHotkeyValue(value) {
            hotkeyField.value = value;
            hotkeyField.dispatchEvent(new Event("input", { bubbles: true }));
            hotkeyField.dispatchEvent(new Event("change", { bubbles: true }));
        }

        function normalizeHotkey(value) {
            const trimmed = String(value ?? "").trim();
            if (!trimmed) return "";

            if (/^[\x21-\x7E]$/.test(trimmed)) {
                return trimmed;
            }

            const functionMatch = /^f([1-9]|1[0-9]|2[0-4])$/i.exec(trimmed);
            if (functionMatch) {
                return `F${functionMatch[1]}`;
            }

            const named = namedKeys.get(trimmed.toLowerCase());
            if (named) {
                return named;
            }

            return null;
        }

        function applyHotkeyValidation() {
            if (!hotkeyField) {
                return;
            }
            const normalized = normalizeHotkey(hotkeyField.value);
            if (normalized === null) {
                hotkeyField.value = lastValidHotkey;
                return;
            }

            hotkeyField.value = normalized;
            lastValidHotkey = normalized;
        }

        if (hotkeyField && specialKeyToggle && specialKeyMenu) {
            for (const key of pickerKeys) {
                const menuItem = document.createElement("li");
                const button = document.createElement("button");
                button.type = "button";
                button.textContent = key;
                button.addEventListener("click", () => {
                    setHotkeyValue(key);
                    closeSpecialKeyMenu();
                });
                menuItem.appendChild(button);
                specialKeyMenu.appendChild(menuItem);
            }

            specialKeyToggle.addEventListener("click", (event) => {
                event.stopPropagation();
                toggleSpecialKeyMenu();
            });

            document.addEventListener("click", (event) => {
                if (!specialKeyMenu.hidden && !specialKeyMenu.contains(event.target) && event.target !== specialKeyToggle) {
                    closeSpecialKeyMenu();
                }
            });

            document.addEventListener("keydown", (event) => {
                if (event.key === "Escape") {
                    closeSpecialKeyMenu();
                }
            });

            hotkeyField.addEventListener("input", applyHotkeyValidation);
            hotkeyField.addEventListener("change", applyHotkeyValidation);
       }
    </script>
</body>
</html>
